---
- name: Verify Users Custom Module
  hosts: localhost
  tasks:
    - name: Read usernames from CSV
      command: awk 'NR>1 {print $1}' users.csv
      register: csv_users

    - name: Run custom module to check users
      check_user:
        username: "{{ item }}"
      loop: "{{ csv_users.stdout_lines }}"
      register: user_results

    - name: Display Results
      debug:
        msg: "Username: {{ item.item }} - {{ item.msg }}"
      loop: "{{ user_results.results }}"
